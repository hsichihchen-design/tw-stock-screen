name: Daily Taiwan Stock Screen

on:
  schedule:
    # 每天台灣時間 16:30 執行 (UTC 08:30)
    - cron: '40 5 * * *'
  workflow_dispatch: # 允許你手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 👈 升級為 v4，解決 Node.js 警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 👈 升級為 v5，解決 Node.js 警告
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scan Script
        run: python update_data.py

      - name: Commit and Push JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add uptrend_results.json
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || exit 0
          
          # 👇 加入這行防呆機制：上傳前先同步主線，避免版本衝突
          git pull --rebase origin main  
          
          git push
